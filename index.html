<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Chess Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: white;
        }
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            aspect-ratio: 1 / 1;
            border: 4px solid #b58863;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .square {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .square.selected { background-color: #ffcf8b !important; }
        .square.last-move { background-color: rgba(255, 255, 51, 0.5) !important; }
        .square.check { background-color: rgba(239, 68, 68, 0.8) !important; }
        
        .move-indicator {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            z-index: 20;
        }
        .capture-indicator {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            z-index: 20;
        }
        
        .piece {
            width: 85%;
            height: 85%;
            z-index: 10;
            user-select: none;
            transition: transform 0.1s;
        }
        .piece:active { transform: scale(1.1); }
        
        .coord {
            position: absolute;
            font-size: 10px;
            font-weight: bold;
            user-select: none;
        }
        .coord-light { color: #b58863; }
        .coord-dark { color: #f0d9b5; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .title-gradient {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

        const modalBody = document.getElementById('modal-body');

        // Multiplayer Logic
        async function createGame() {
            const gameId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const gameRef = ref(db, 'games/' + gameId);
            
            await set(gameRef, {
                fen: game.fen(),
                lastMove: null,
                players: {
                    white: playerId,
                    black: null
                },
                status: 'waiting',
                createdAt: Date.now()
            });

            joinGame(gameId);
        }

        async function joinGame(gameId) {
            gameId = gameId.toUpperCase();
            const gameRef = ref(db, 'games/' + gameId);
            const snapshot = await get(gameRef);

            if (!snapshot.exists()) {
                alert('Game not found!');
                return;
            }

            const data = snapshot.val();
            currentGameId = gameId;

            // Assign role
            if (data.players.white === playerId) {
                playerRole = 'w';
            } else if (data.players.black === playerId) {
                playerRole = 'b';
            } else if (!data.players.black) {
                // Join as black
                await update(gameRef, {
                    'players/black': playerId,
                    status: 'playing'
                });
                playerRole = 'b';
            } else {
                alert('Game is full!');
                return;
            }

            setupGameUI();
            listenToGame();
        }

        function setupGameUI() {
            titleScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            displayGameId.innerText = currentGameId;
            playerRoleText.innerText = playerRole === 'w' ? 'White' : 'Black';
            playerRoleIcon.innerText = playerRole === 'w' ? '♔' : '♚';
        }

        function listenToGame() {
            const gameRef = ref(db, 'games/' + currentGameId);
            onValue(gameRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                game.load(data.fen);
                lastMove = data.lastMove;
                
                // Update opponent status
                if (data.players.white && data.players.black) {
                    opponentStatusText.innerText = 'Online';
                    opponentStatusText.className = 'font-bold text-emerald-400';
                } else {
                    opponentStatusText.innerText = 'Waiting...';
                    opponentStatusText.className = 'font-bold text-amber-400';
                }

                createBoard();
                updateHistory();
            });
        }

        function createBoard() {
            boardEl.innerHTML = '';
            const board = game.board();
            const squareNames = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

            for (let r = 0; r < 8; r++) {
                const row = playerRole === 'b' ? 7 - r : r;
                for (let c = 0; c < 8; c++) {
                    const col = playerRole === 'b' ? 7 - c : c;
                    
                    const squareName = `${squareNames[col]}${8 - row}`;
                    const piece = board[row][col];
                    const isDark = (row + col) % 2 === 1;
                    
                    const squareEl = document.createElement('div');
                    squareEl.className = `square ${isDark ? 'dark' : 'light'}`;
                    squareEl.dataset.square = squareName;
                    
                    if (selectedSquare === squareName) squareEl.classList.add('selected');
                    if (lastMove && (lastMove.from === squareName || lastMove.to === squareName)) {
                        squareEl.classList.add('last-move');
                    }
                    if (game.in_check() && piece && piece.type === 'k' && piece.color === game.turn()) {
                        squareEl.classList.add('check');
                    }

                    if (piece) {
                        const pieceEl = document.createElement('div');
                        pieceEl.className = 'piece';
                        pieceEl.innerHTML = PIECES[`${piece.color}${piece.type.toUpperCase()}`];
                        squareEl.appendChild(pieceEl);
                    }

                    if (selectedSquare && game.turn() === playerRole) {
                        const moves = game.moves({ square: selectedSquare, verbose: true });
                        const move = moves.find(m => m.to === squareName);
                        if (move) {
                            const indicator = document.createElement('div');
                            indicator.className = piece ? 'capture-indicator' : 'move-indicator';
                            squareEl.appendChild(indicator);
                        }
                    }

                    squareEl.onclick = () => handleSquareClick(squareName);
                    boardEl.appendChild(squareEl);
                }
            }
            updateStatus();
        }

        async function handleSquareClick(square) {
            if (game.game_over() || game.turn() !== playerRole) return;

            const piece = game.get(square);
            const moves = game.moves({ square: selectedSquare, verbose: true });
            const move = moves.find(m => m.to === square);

            if (move) {
                const result = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q'
                });
                if (result) {
                    const gameRef = ref(db, 'games/' + currentGameId);
                    await update(gameRef, {
                        fen: game.fen(),
                        lastMove: result
                    });
                    selectedSquare = null;
                    return;
                }
            }

            if (piece && piece.color === playerRole) {
                selectedSquare = square;
            } else {
                selectedSquare = null;
            }
            createBoard();
        }

        function updateStatus() {
            const turn = game.turn() === 'w' ? 'White' : 'Black';
            const isMyTurn = game.turn() === playerRole;
            
            if (game.game_over()) {
                statusText.innerText = 'Game Over';
                showGameOver();
            } else {
                statusText.innerText = isMyTurn ? "Your Turn" : `${turn}'s Turn`;
            }

            turnIndicator.className = `w-4 h-4 rounded-full ${game.turn() === 'w' ? 'bg-white border border-black/20' : 'bg-black border border-white/20'}`;
            
            if (game.in_check() && !game.game_over()) {
                checkBadge.classList.remove('hidden');
            } else {
                checkBadge.classList.add('hidden');
            }
        }

        function updateHistory() {
            const history = game.history();
            if (history.length === 0) {
                moveHistoryEl.innerHTML = '<p class="text-white/40 italic text-sm col-span-2">No moves yet...</p>';
                return;
            }

            moveHistoryEl.innerHTML = '';
            for (let i = 0; i < history.length; i += 2) {
                const moveNum = Math.floor(i / 2) + 1;
                
                const whiteMove = document.createElement('div');
                whiteMove.className = 'text-sm text-white/60 flex gap-2';
                whiteMove.innerHTML = `<span class="w-4 text-white/30">${moveNum}.</span><span class="font-mono text-white">${history[i]}</span>`;
                moveHistoryEl.appendChild(whiteMove);

                if (history[i + 1]) {
                    const blackMove = document.createElement('div');
                    blackMove.className = 'text-sm text-white/60 flex gap-2';
                    blackMove.innerHTML = `<span class="font-mono text-white">${history[i + 1]}</span>`;
                    moveHistoryEl.appendChild(blackMove);
                }
            }
            moveHistoryEl.scrollTop = moveHistoryEl.scrollHeight;
        }

        function showGameOver() {
            modal.classList.remove('hidden');
            if (game.in_checkmate()) {
                modalTitle.innerText = 'Checkmate!';
                modalBody.innerText = `${game.turn() === 'w' ? 'Black' : 'White'} wins the game.`;
            } else if (game.in_draw()) {
                modalTitle.innerText = 'Draw!';
                modalBody.innerText = game.in_stalemate() ? 'Stalemate! No legal moves left.' : 'The game ended in a draw.';
            }
        }

        window.copyGameId = () => {
            navigator.clipboard.writeText(currentGameId);
            alert('Game ID copied to clipboard!');
        };

        // Event Listeners
        document.getElementById('create-game-btn').onclick = createGame;
        document.getElementById('join-game-btn').onclick = () => {
            const id = document.getElementById('join-game-id').value;
            if (id) joinGame(id);
        };
    </script>
</body>
</html>
