<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♔</text></svg>">
    <title>Grandmaster Chess Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: white;
        }
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            aspect-ratio: 1 / 1;
            border: 4px solid #b58863;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .square {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .square.selected { background-color: #ffcf8b !important; }
        .square.last-move { background-color: rgba(255, 255, 51, 0.5) !important; }
        .square.check { background-color: rgba(239, 68, 68, 0.8) !important; }
        
        .move-indicator {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            z-index: 20;
        }
        .capture-indicator {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            z-index: 20;
        }
        
        .piece {
            width: 85%;
            height: 85%;
            z-index: 10;
            user-select: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }
        .piece:hover { 
            transform: scale(1.15) translateY(-4px); 
            filter: drop-shadow(0 12px 12px rgba(0,0,0,0.4));
            z-index: 50;
        }
        .piece:active { transform: scale(1.05); }
        
        .coord {
            position: absolute;
            font-size: 10px;
            font-weight: bold;
            user-select: none;
        }
        .coord-light { color: #b58863; }
        .coord-dark { color: #f0d9b5; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .title-gradient {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="antialiased">
    <!-- Title Screen -->
    <div id="title-screen" class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="max-w-md w-full text-center space-y-8">
            <div class="space-y-4">
                <div class="w-24 h-24 bg-indigo-500 rounded-3xl flex items-center justify-center shadow-2xl shadow-indigo-500/40 mx-auto transform -rotate-6">
                    <svg class="w-14 h-14 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                </div>
                <h1 class="text-5xl font-black tracking-tighter title-gradient">GRANDMASTER CHESS</h1>
                <p class="text-white/50 font-medium">Multiplayer Real-time Strategy</p>
            </div>

            <div class="space-y-4 bg-white/5 p-8 rounded-3xl border border-white/10 backdrop-blur-xl">
                <button id="create-game-btn" class="w-full py-4 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-2xl transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Create New Game
                </button>
                
                <div class="relative py-4">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#1a1a1a] px-2 text-white/30">Or Join Game</span></div>
                </div>

                <div class="flex gap-2">
                    <input type="text" id="join-game-id" placeholder="Enter Game ID" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                    <button id="join-game-btn" class="px-6 py-3 bg-white/10 hover:bg-white/20 text-white font-bold rounded-xl transition-all border border-white/10">
                        Join
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="min-h-screen flex flex-col hidden">
        <!-- Header -->
        <header class="w-full h-16 border-b border-white/10 flex items-center justify-between px-8 bg-black/20 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                </div>
                <h1 class="text-lg font-bold tracking-tight hidden sm:block">Grandmaster <span class="text-indigo-400">Chess</span></h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="bg-white/5 px-4 py-1.5 rounded-full border border-white/10 flex items-center gap-2">
                    <span class="text-xs text-white/40 uppercase font-bold tracking-wider">Game ID:</span>
                    <span id="display-game-id" class="font-mono text-indigo-400 font-bold">------</span>
                    <button onclick="copyGameId()" class="p-1 hover:bg-white/10 rounded transition-colors">
                        <svg class="w-3.5 h-3.5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                    </button>
                </div>
                <button onclick="location.reload()" class="text-white/40 hover:text-white text-xs font-bold uppercase tracking-widest transition-colors">Leave</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 py-12 px-4 container mx-auto">
            <div class="flex flex-col lg:flex-row gap-8 items-start justify-center">
                <div class="flex flex-col gap-4 w-full max-w-[600px]">
                    <!-- Status Bar -->
                    <div class="flex items-center justify-between bg-white/5 backdrop-blur-sm p-4 rounded-xl border border-white/10">
                        <div class="flex items-center gap-3">
                            <div id="turn-indicator" class="w-4 h-4 rounded-full bg-white border border-black/20"></div>
                            <span id="status-text" class="text-lg font-medium">Waiting for opponent...</span>
                        </div>
                        <div id="check-badge" class="hidden px-3 py-1 bg-red-500/20 text-red-400 text-sm font-bold rounded-full border border-red-500/30 animate-pulse">
                            CHECK
                        </div>
                    </div>

                    <!-- Board -->
                    <div id="board" class="chess-board rounded-lg overflow-hidden"></div>

                    <!-- Player Info -->
                    <div class="flex justify-between items-center px-2">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center border border-white/10">
                                <span id="player-role-icon" class="text-lg">?</span>
                            </div>
                            <div>
                                <p class="text-xs text-white/40 font-bold uppercase tracking-widest">You are playing as</p>
                                <p id="player-role-text" class="font-bold text-white">Assigning...</p>
                            </div>
                        </div>
                        <div id="opponent-status" class="text-right">
                            <p class="text-xs text-white/40 font-bold uppercase tracking-widest">Opponent</p>
                            <p id="opponent-status-text" class="font-bold text-red-400">Offline</p>
                        </div>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="w-full lg:w-80 flex flex-col gap-4">
                    <div class="bg-white/5 backdrop-blur-sm p-6 rounded-2xl border border-white/10 flex flex-col gap-4 h-[400px] lg:h-[600px]">
                        <h3 class="text-xl font-bold border-b border-white/10 pb-2">Move History</h3>
                        <div id="move-history" class="flex-1 overflow-y-auto pr-2 custom-scrollbar grid grid-cols-2 gap-x-4 gap-y-2 content-start">
                            <p class="text-white/40 italic text-sm col-span-2">No moves yet...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Modal -->
        <div id="game-over-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
            <div class="bg-[#2a2a2a] p-8 rounded-3xl border border-white/10 max-w-sm w-full shadow-2xl text-center">
                <h2 id="modal-title" class="text-3xl font-bold mb-2">Checkmate!</h2>
                <p id="modal-body" class="text-white/70 mb-6">White wins the game.</p>
                <button onclick="location.reload()" class="w-full py-4 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-2xl transition-all shadow-lg shadow-indigo-500/20">
                    Back to Menu
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvU2DH8o3baDrRPmihP45R39OtSjhk2aA",
            authDomain: "chess-4b89c.firebaseapp.com",
            databaseURL: "https://chess-4b89c-default-rtdb.firebaseio.com",
            projectId: "chess-4b89c",
            storageBucket: "chess-4b89c.firebasestorage.app",
            messagingSenderId: "1052008395512",
            appId: "1:1052008395512:web:c3dc29b8da9480b25a810d",
            measurementId: "G-1L9KKDPGYR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Chess Logic
        const PIECES = {
            wP: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/wP.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            wN: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/wN.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            wB: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/wB.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            wR: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/wR.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            wQ: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/wQ.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            wK: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/wK.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            bP: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/bP.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            bN: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/bN.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            bB: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/bB.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            bR: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/bR.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            bQ: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/bQ.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
            bK: '<img src="https://chessboardjs.com/img/chesspieces/wikipedia/bK.png" class="w-full h-full object-contain" referrerPolicy="no-referrer" />',
        };

        const game = new Chess();
        let currentGameId = null;
        let playerRole = null; // 'w' or 'b'
        let selectedSquare = null;
        let lastMove = null;
        let playerId = localStorage.getItem('chess_player_id') || Math.random().toString(36).substring(2, 15);
        localStorage.setItem('chess_player_id', playerId);

        // UI Elements
        const titleScreen = document.getElementById('title-screen');
        const gameScreen = document.getElementById('game-screen');
        const boardEl = document.getElementById('board');
        const statusText = document.getElementById('status-text');
        const turnIndicator = document.getElementById('turn-indicator');
        const checkBadge = document.getElementById('check-badge');
        const moveHistoryEl = document.getElementById('move-history');
        const displayGameId = document.getElementById('display-game-id');
        const playerRoleText = document.getElementById('player-role-text');
        const playerRoleIcon = document.getElementById('player-role-icon');
        const opponentStatusText = document.getElementById('opponent-status-text');
        const modal = document.getElementById('game-over-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');

        // Multiplayer Logic
        async function createGame() {
            try {
                const gameId = Math.random().toString(36).substring(2, 8).toUpperCase();
                const gameRef = ref(db, 'games/' + gameId);
                
                await set(gameRef, {
                    fen: game.fen(),
                    lastMove: null,
                    players: {
                        white: playerId,
                        black: null
                    },
                    status: 'waiting',
                    createdAt: Date.now()
                });

                joinGame(gameId);
            } catch (error) {
                console.error("Firebase Error:", error);
                if (error.message.includes("PERMISSION_DENIED")) {
                    showPermissionError();
                } else {
                    alert("Failed to create game: " + error.message);
                }
            }
        }

        function showPermissionError() {
            const errorHtml = `
                <div class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                    <div class="bg-[#2a2a2a] p-8 rounded-3xl border border-red-500/30 max-w-md w-full shadow-2xl">
                        <h2 class="text-2xl font-bold text-red-400 mb-4">Firebase Permission Denied</h2>
                        <p class="text-white/70 mb-6 text-sm leading-relaxed">
                            Your Firebase Realtime Database rules are preventing the app from writing data. 
                            To fix this, go to your <b>Firebase Console</b> > <b>Realtime Database</b> > <b>Rules</b> and paste:
                        </p>
                        <pre class="bg-black/40 p-4 rounded-xl text-xs font-mono text-indigo-300 mb-6 overflow-x-auto">
{
  "rules": {
    ".read": "true",
    ".write": "true"
  }
}</pre>
                        <button onclick="location.reload()" class="w-full py-3 bg-white/10 hover:bg-white/20 text-white font-bold rounded-xl transition-all border border-white/10">
                            I've updated the rules, reload
                        </button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', errorHtml);
        }

        async function joinGame(gameId) {
            gameId = gameId.toUpperCase();
            const gameRef = ref(db, 'games/' + gameId);
            const snapshot = await get(gameRef);

            if (!snapshot.exists()) {
                alert('Game not found!');
                return;
            }

            const data = snapshot.val();
            currentGameId = gameId;

            // Assign role
            if (data.players.white === playerId) {
                playerRole = 'w';
            } else if (data.players.black === playerId) {
                playerRole = 'b';
            } else if (!data.players.black) {
                // Join as black
                await update(gameRef, {
                    'players/black': playerId,
                    status: 'playing'
                });
                playerRole = 'b';
            } else {
                alert('Game is full!');
                return;
            }

            setupGameUI();
            listenToGame();
        }

        function setupGameUI() {
            titleScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            displayGameId.innerText = currentGameId;
            playerRoleText.innerText = playerRole === 'w' ? 'White' : 'Black';
            playerRoleIcon.innerText = playerRole === 'w' ? '♔' : '♚';
        }

        function listenToGame() {
            const gameRef = ref(db, 'games/' + currentGameId);
            onValue(gameRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                game.load(data.fen);
                lastMove = data.lastMove;
                
                // Update opponent status
                if (data.players.white && data.players.black) {
                    opponentStatusText.innerText = 'Online';
                    opponentStatusText.className = 'font-bold text-emerald-400';
                } else {
                    opponentStatusText.innerText = 'Waiting...';
                    opponentStatusText.className = 'font-bold text-amber-400';
                }

                createBoard();
                updateHistory();
            });
        }

        function createBoard() {
            boardEl.innerHTML = '';
            const board = game.board();
            const squareNames = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

            for (let r = 0; r < 8; r++) {
                const row = playerRole === 'b' ? 7 - r : r;
                for (let c = 0; c < 8; c++) {
                    const col = playerRole === 'b' ? 7 - c : c;
                    
                    const squareName = `${squareNames[col]}${8 - row}`;
                    const piece = board[row][col];
                    const isDark = (row + col) % 2 === 1;
                    
                    const squareEl = document.createElement('div');
                    squareEl.className = `square ${isDark ? 'dark' : 'light'}`;
                    squareEl.dataset.square = squareName;
                    
                    if (selectedSquare === squareName) squareEl.classList.add('selected');
                    if (lastMove && (lastMove.from === squareName || lastMove.to === squareName)) {
                        squareEl.classList.add('last-move');
                    }
                    if (game.in_check() && piece && piece.type === 'k' && piece.color === game.turn()) {
                        squareEl.classList.add('check');
                    }

                    if (piece) {
                        const pieceEl = document.createElement('div');
                        pieceEl.className = 'piece';
                        pieceEl.innerHTML = PIECES[`${piece.color}${piece.type.toUpperCase()}`];
                        squareEl.appendChild(pieceEl);
                    }

                    if (selectedSquare && game.turn() === playerRole) {
                        const moves = game.moves({ square: selectedSquare, verbose: true });
                        const move = moves.find(m => m.to === squareName);
                        if (move) {
                            const indicator = document.createElement('div');
                            indicator.className = piece ? 'capture-indicator' : 'move-indicator';
                            squareEl.appendChild(indicator);
                        }
                    }

                    squareEl.onclick = () => handleSquareClick(squareName);
                    boardEl.appendChild(squareEl);
                }
            }
            updateStatus();
        }

        async function handleSquareClick(square) {
            if (game.game_over() || game.turn() !== playerRole) return;

            const piece = game.get(square);
            const moves = game.moves({ square: selectedSquare, verbose: true });
            const move = moves.find(m => m.to === square);

            if (move) {
                const result = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q'
                });
                if (result) {
                    try {
                        const gameRef = ref(db, 'games/' + currentGameId);
                        await update(gameRef, {
                            fen: game.fen(),
                            lastMove: result
                        });
                        selectedSquare = null;
                    } catch (error) {
                        console.error("Move Error:", error);
                        if (error.message.includes("PERMISSION_DENIED")) {
                            showPermissionError();
                        }
                    }
                    return;
                }
            }

            if (piece && piece.color === playerRole) {
                selectedSquare = square;
            } else {
                selectedSquare = null;
            }
            createBoard();
        }

        function updateStatus() {
            const turn = game.turn() === 'w' ? 'White' : 'Black';
            const isMyTurn = game.turn() === playerRole;
            
            if (game.game_over()) {
                statusText.innerText = 'Game Over';
                showGameOver();
            } else {
                statusText.innerText = isMyTurn ? "Your Turn" : `${turn}'s Turn`;
            }

            turnIndicator.className = `w-4 h-4 rounded-full ${game.turn() === 'w' ? 'bg-white border border-black/20' : 'bg-black border border-white/20'}`;
            
            if (game.in_check() && !game.game_over()) {
                checkBadge.classList.remove('hidden');
            } else {
                checkBadge.classList.add('hidden');
            }
        }

        function updateHistory() {
            const history = game.history();
            if (history.length === 0) {
                moveHistoryEl.innerHTML = '<p class="text-white/40 italic text-sm col-span-2">No moves yet...</p>';
                return;
            }

            moveHistoryEl.innerHTML = '';
            for (let i = 0; i < history.length; i += 2) {
                const moveNum = Math.floor(i / 2) + 1;
                
                const whiteMove = document.createElement('div');
                whiteMove.className = 'text-sm text-white/60 flex gap-2';
                whiteMove.innerHTML = `<span class="w-4 text-white/30">${moveNum}.</span><span class="font-mono text-white">${history[i]}</span>`;
                moveHistoryEl.appendChild(whiteMove);

                if (history[i + 1]) {
                    const blackMove = document.createElement('div');
                    blackMove.className = 'text-sm text-white/60 flex gap-2';
                    blackMove.innerHTML = `<span class="font-mono text-white">${history[i + 1]}</span>`;
                    moveHistoryEl.appendChild(blackMove);
                }
            }
            moveHistoryEl.scrollTop = moveHistoryEl.scrollHeight;
        }

        function showGameOver() {
            modal.classList.remove('hidden');
            if (game.in_checkmate()) {
                modalTitle.innerText = 'Checkmate!';
                modalBody.innerText = `${game.turn() === 'w' ? 'Black' : 'White'} wins the game.`;
            } else if (game.in_draw()) {
                modalTitle.innerText = 'Draw!';
                modalBody.innerText = game.in_stalemate() ? 'Stalemate! No legal moves left.' : 'The game ended in a draw.';
            }
        }

        window.copyGameId = () => {
            navigator.clipboard.writeText(currentGameId);
            alert('Game ID copied to clipboard!');
        };

        // Event Listeners
        document.getElementById('create-game-btn').onclick = createGame;
        document.getElementById('join-game-btn').onclick = () => {
            const id = document.getElementById('join-game-id').value;
            if (id) joinGame(id);
        };
    </script>
</body>
</html>
