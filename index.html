<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster Chess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #2a2a2a 0%, #1a1a1a 100%);
            min-height: screen;
            color: white;
        }
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            aspect-ratio: 1 / 1;
            border: 4px solid #b58863;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .square {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .square.light { background-color: #f0d9b5; }
        .square.dark { background-color: #b58863; }
        .square.selected { background-color: #ffcf8b !important; }
        .square.last-move { background-color: rgba(255, 255, 51, 0.5) !important; }
        .square.check { background-color: rgba(239, 68, 68, 0.8) !important; }
        
        .move-indicator {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            z-index: 20;
        }
        .capture-indicator {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            z-index: 20;
        }
        
        .piece {
            width: 85%;
            height: 85%;
            z-index: 10;
            user-select: none;
            transition: transform 0.1s;
        }
        .piece:active { transform: scale(1.1); }
        
        .coord {
            position: absolute;
            font-size: 10px;
            font-weight: bold;
            user-select: none;
        }
        .coord-light { color: #b58863; }
        .coord-dark { color: #f0d9b5; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="w-full h-16 border-b border-white/10 flex items-center justify-between px-8 bg-black/20 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Grandmaster <span class="text-indigo-400">Chess</span></h1>
            </div>
            <div class="text-white/40 text-xs hidden sm:block">Pure HTML/JS Version</div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 py-12 px-4 container mx-auto">
            <div class="flex flex-col lg:flex-row gap-8 items-start justify-center">
                <div class="flex flex-col gap-4 w-full max-w-[600px]">
                    <!-- Status Bar -->
                    <div class="flex items-center justify-between bg-white/5 backdrop-blur-sm p-4 rounded-xl border border-white/10">
                        <div class="flex items-center gap-3">
                            <div id="turn-indicator" class="w-4 h-4 rounded-full bg-white border border-black/20"></div>
                            <span id="status-text" class="text-lg font-medium">White's Turn</span>
                        </div>
                        <div id="check-badge" class="hidden px-3 py-1 bg-red-500/20 text-red-400 text-sm font-bold rounded-full border border-red-500/30 animate-pulse">
                            CHECK
                        </div>
                    </div>

                    <!-- Board -->
                    <div id="board" class="chess-board rounded-lg overflow-hidden"></div>

                    <!-- Controls -->
                    <div class="flex gap-2">
                        <button onclick="undoMove()" id="undo-btn" class="flex-1 py-3 bg-white/10 hover:bg-white/20 disabled:opacity-50 text-white font-medium rounded-xl transition-all border border-white/10">
                            Undo
                        </button>
                        <button onclick="resetGame()" class="flex-1 py-3 bg-red-500/20 hover:bg-red-500/30 text-red-400 font-medium rounded-xl transition-all border border-red-500/30">
                            Reset Game
                        </button>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="w-full lg:w-80 flex flex-col gap-4">
                    <div class="bg-white/5 backdrop-blur-sm p-6 rounded-2xl border border-white/10 flex flex-col gap-4 h-[400px] lg:h-[600px]">
                        <h3 class="text-xl font-bold border-b border-white/10 pb-2">Move History</h3>
                        <div id="move-history" class="flex-1 overflow-y-auto pr-2 custom-scrollbar grid grid-cols-2 gap-x-4 gap-y-2 content-start">
                            <p class="text-white/40 italic text-sm col-span-2">No moves yet...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Modal -->
        <div id="game-over-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
            <div class="bg-[#2a2a2a] p-8 rounded-3xl border border-white/10 max-w-sm w-full shadow-2xl text-center">
                <h2 id="modal-title" class="text-3xl font-bold mb-2">Checkmate!</h2>
                <p id="modal-body" class="text-white/70 mb-6">White wins the game.</p>
                <button onclick="resetGame()" class="w-full py-4 bg-indigo-500 hover:bg-indigo-600 text-white font-bold rounded-2xl transition-all shadow-lg shadow-indigo-500/20">
                    Play Again
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="w-full py-8 border-t border-white/10 bg-black/20 mt-auto">
            <div class="container mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-sm">
                <p>© 2026 Grandmaster Chess. Built for GitHub Pages.</p>
                <div class="flex gap-8">
                    <a href="https://github.com" class="hover:text-white">GitHub</a>
                    <a href="#" class="hover:text-white">About</a>
                </div>
            </div>
        </footer>
    </div>

        const game = new Chess();
        let selectedSquare = null;
        let lastMove = null;

        const boardEl = document.getElementById('board');
        const statusText = document.getElementById('status-text');
        const turnIndicator = document.getElementById('turn-indicator');
        const checkBadge = document.getElementById('check-badge');
        const moveHistoryEl = document.getElementById('move-history');
        const undoBtn = document.getElementById('undo-btn');
        const modal = document.getElementById('game-over-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');

        function createBoard() {
            boardEl.innerHTML = '';
            const board = game.board();
            const squareNames = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const squareName = `${squareNames[col]}${8 - row}`;
                    const piece = board[row][col];
                    const isDark = (row + col) % 2 === 1;
                    
                    const squareEl = document.createElement('div');
                    squareEl.className = `square ${isDark ? 'dark' : 'light'}`;
                    squareEl.dataset.square = squareName;
                    
                    // Highlights
                    if (selectedSquare === squareName) squareEl.classList.add('selected');
                    if (lastMove && (lastMove.from === squareName || lastMove.to === squareName)) {
                        squareEl.classList.add('last-move');
                    }
                    if (game.in_check() && piece && piece.type === 'k' && piece.color === game.turn()) {
                        squareEl.classList.add('check');
                    }

                    // Coordinates
                    if (col === 0) {
                        const rCoord = document.createElement('span');
                        rCoord.className = `coord top-0.5 left-0.5 ${isDark ? 'coord-dark' : 'coord-light'}`;
                        rCoord.innerText = 8 - row;
                        squareEl.appendChild(rCoord);
                    }
                    if (row === 7) {
                        const cCoord = document.createElement('span');
                        cCoord.className = `coord bottom-0.5 right-0.5 ${isDark ? 'coord-dark' : 'coord-light'}`;
                        cCoord.innerText = squareNames[col];
                        squareEl.appendChild(cCoord);
                    }

                    // Piece
                    if (piece) {
                        const pieceEl = document.createElement('div');
                        pieceEl.className = 'piece';
                        pieceEl.innerHTML = PIECES[`${piece.color}${piece.type.toUpperCase()}`];
                        squareEl.appendChild(pieceEl);
                    }

                    // Move Indicators
                    if (selectedSquare) {
                        const moves = game.moves({ square: selectedSquare, verbose: true });
                        const move = moves.find(m => m.to === squareName);
                        if (move) {
                            const indicator = document.createElement('div');
                            indicator.className = piece ? 'capture-indicator' : 'move-indicator';
                            squareEl.appendChild(indicator);
                        }
                    }

                    squareEl.onclick = () => handleSquareClick(squareName);
                    boardEl.appendChild(squareEl);
                }
            }
            updateStatus();
        }

        function handleSquareClick(square) {
            if (game.game_over()) return;

            const piece = game.get(square);
            const moves = game.moves({ square: selectedSquare, verbose: true });
            const move = moves.find(m => m.to === square);

            if (move) {
                const result = game.move({
                    from: selectedSquare,
                    to: square,
                    promotion: 'q' // Always promote to queen for simplicity
                });
                if (result) {
                    lastMove = result;
                    selectedSquare = null;
                    createBoard();
                    updateHistory();
                    return;
                }
            }

            if (piece && piece.color === game.turn()) {
                selectedSquare = square;
            } else {
                selectedSquare = null;
            }
            createBoard();
        }

        function updateStatus() {
            const turn = game.turn() === 'w' ? 'White' : 'Black';
            statusText.innerText = game.game_over() ? 'Game Over' : `${turn}'s Turn`;
            turnIndicator.className = `w-4 h-4 rounded-full ${game.turn() === 'w' ? 'bg-white border border-black/20' : 'bg-black border border-white/20'}`;
            
            if (game.in_check() && !game.game_over()) {
                checkBadge.classList.remove('hidden');
            } else {
                checkBadge.classList.add('hidden');
            }

            if (game.game_over()) {
                showGameOver();
            }
            
            undoBtn.disabled = game.history().length === 0;
        }

        function updateHistory() {
            const history = game.history();
            if (history.length === 0) {
                moveHistoryEl.innerHTML = '<p class="text-white/40 italic text-sm col-span-2">No moves yet...</p>';
                return;
            }

            moveHistoryEl.innerHTML = '';
            for (let i = 0; i < history.length; i += 2) {
                const moveNum = Math.floor(i / 2) + 1;
                
                const whiteMove = document.createElement('div');
                whiteMove.className = 'text-sm text-white/60 flex gap-2';
                whiteMove.innerHTML = `<span class="w-4 text-white/30">${moveNum}.</span><span class="font-mono text-white">${history[i]}</span>`;
                moveHistoryEl.appendChild(whiteMove);

                if (history[i + 1]) {
                    const blackMove = document.createElement('div');
                    blackMove.className = 'text-sm text-white/60 flex gap-2';
                    blackMove.innerHTML = `<span class="font-mono text-white">${history[i + 1]}</span>`;
                    moveHistoryEl.appendChild(blackMove);
                }
            }
            moveHistoryEl.scrollTop = moveHistoryEl.scrollHeight;
        }

        function undoMove() {
            game.undo();
            const history = game.history({ verbose: true });
            lastMove = history.length > 0 ? history[history.length - 1] : null;
            selectedSquare = null;
            createBoard();
            updateHistory();
        }

        function resetGame() {
            game.reset();
            selectedSquare = null;
            lastMove = null;
            modal.classList.add('hidden');
            createBoard();
            updateHistory();
        }

        function showGameOver() {
            modal.classList.remove('hidden');
            if (game.in_checkmate()) {
                modalTitle.innerText = 'Checkmate!';
                modalBody.innerText = `${game.turn() === 'w' ? 'Black' : 'White'} wins the game.`;
            } else if (game.in_draw()) {
                modalTitle.innerText = 'Draw!';
                modalBody.innerText = game.in_stalemate() ? 'Stalemate! No legal moves left.' : 'The game ended in a draw.';
            } else {
                modalTitle.innerText = 'Game Over';
                modalBody.innerText = 'The game has ended.';
            }
        }

        // Initialize
        createBoard();
    </script>
